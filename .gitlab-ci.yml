stages:
  - validate
  - build
  - deploy

default:
  image: alpine:latest

validate-job:
  stage: validate
  script:
    - echo "Validation OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

build-job:
  stage: build
  script:
    - echo "Build OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

deploy-job:
  stage: deploy
  script:
    - echo "Deploy OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
