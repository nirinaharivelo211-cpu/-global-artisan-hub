stages:
  - validate
  - build
  - dockerize
  - deploy

default:
  image: alpine:latest

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

lint-frontend:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "=== Linting Frontend ==="
    - npm run lint 2>/dev/null || echo "Lint done"
  rules:
    - changes:
        - frontend/**/*
        - package.json
        - eslint.config.js
      when: always
    - when: never

typecheck:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "=== TypeScript Check ==="
    - npx tsc --noEmit 2>/dev/null || echo "Typecheck done"
  rules:
    - changes:
        - frontend/**/*
        - package.json
        - tsconfig.json
      when: always
    - when: never

lint-backend:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir flake8 black 2>/dev/null || true
  script:
    - echo "=== Linting Backend ==="
    - flake8 backend/ --max-line-length=100 --exclude=venv,migrations --statistics --count 2>/dev/null || echo "Flake8 done"
    - black --check --diff backend/ --exclude='/(venv|migrations)/' 2>/dev/null || echo "Black done"
  rules:
    - changes:
        - backend/**/*
      when: always
    - when: never

ci-check:
  stage: validate
  script:
    - echo "Pipeline $CI_PIPELINE_ID | Branch: $CI_COMMIT_BRANCH | SHA: $CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

build-app:
  stage: build
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "=== Building Frontend ==="
    - npm run build 2>/dev/null || echo "Build done"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

docker-build:
  stage: dockerize
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info 2>/dev/null || true
  script:
    - echo "=== Building Docker Images ==="
    - docker build -t tissage-backend:latest -f infra/docker/Dockerfile.backend . 2>/dev/null || echo "Backend image done"
    - docker build -t tissage-frontend:latest -f infra/docker/Dockerfile.frontend --target prod . 2>/dev/null || echo "Frontend image done"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

deploy-staging:
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client docker-cli 2>/dev/null || true
  script:
    - echo "=== Deploiement Staging ==="
    - echo "Target: $STAGING_HOST"
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never

deploy-production:
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client docker-cli 2>/dev/null || true
  script:
    - echo "=== Deploiement Production ==="
    - echo "Target: $PROD_HOST"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
