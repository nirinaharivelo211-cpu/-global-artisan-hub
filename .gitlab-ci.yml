stages:
  - validate
  - build
  - deploy

default:
  image: alpine:latest

validate:
  stage: validate
  script:
    - echo "Running validation for $CI_COMMIT_BRANCH ($CI_COMMIT_SHORT_SHA)"
    - echo "Frontend files changed: $CI_COMMIT_TITLE"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

build:
  stage: build
  image: node:22-alpine
  script:
    - echo "Building project for $CI_COMMIT_BRANCH"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

deploy:
  stage: deploy
  script:
    - echo "Ready to deploy $CI_COMMIT_BRANCH"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
