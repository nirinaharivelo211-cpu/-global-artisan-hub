stages:
  - validate
  - build
  - dockerize
  - deploy

default:
  image: alpine:latest

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

lint-frontend:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "Lint"
  rules:
    - changes:
        - frontend/**/*
      when: always
    - when: never

typecheck:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "TypeScript Check"
  rules:
    - changes:
        - frontend/**/*
        - package.json
        - tsconfig.json
      when: always
    - when: never

lint-backend:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir flake8 black 2>/dev/null || true
  script:
    - echo "Linting Backend"
  rules:
    - changes:
        - backend/**/*
      when: always
    - when: never

ci-check:
  stage: validate
  script:
    - echo "Pipeline check"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

build-job:
  stage: build
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "Build OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

docker-job:
  stage: dockerize
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Dockerize"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

deploy-staging:
  stage: deploy
  script:
    - echo "Deploy staging"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never

deploy-production:
  stage: deploy
  script:
    - echo "Deploy production"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
