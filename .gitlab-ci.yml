stages:
  - validate
  - build
  - dockerize
  - deploy

default:
  image: alpine:latest

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

validate-job:
  stage: validate
  script:
    - echo "Validation OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

extra-check:
  stage: validate
  image: python:3.11-slim
  script:
    - echo "Extra validation"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

build-job:
  stage: build
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm 2>/dev/null || true
  script:
    - echo "Build OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

docker-job:
  stage: dockerize
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Dockerize"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

deploy-job:
  stage: deploy
  script:
    - echo "Deploy OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
