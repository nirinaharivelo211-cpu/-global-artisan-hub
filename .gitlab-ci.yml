# ============================================================
# TISSAGE — Artisan Marketplace (Madagascar)
# Pipeline CI/CD GitLab — Multi-environnement
#
# Infrastructure complète :
#   DEV   → Développement, Debug, Tests unitaires
#   TEST  → Validation QA, API Testing, Tests fonctionnels
#   STAGING → Copie Production, Validation client, Pré-prod
#   PRODUCTION → Utilisateurs, HA, Sauvegardes, Monitoring
#
# Stack technique :
#   Frontend: TanStack Start (Node 22)
#   Backend:  Flask (Python 3.11)
#   DB:       PostgreSQL 16
#   Cache:    Redis 7
#   Proxy:    Nginx
#   Stockage: MinIO
#   Queue:    RabbitMQ
#   Monitoring: Prometheus / Grafana / Loki
#   Sécurité:   SonarQube / Trivy
#   Sauvegarde: Restic
#   SSL:        Let's Encrypt
# ============================================================

stages:
  - validate          # Lint, format, typecheck, analyse statique
  - test              # Tests unitaires, intégration, fonctionnels
  - security          # Trivy, SonarQube
  - build             # Build frontend/backend
  - dockerize         # Images Docker
  - deploy:dev        # Déploiement DEV
  - deploy:test       # Déploiement TEST/QA
  - deploy:staging    # Déploiement STAGING/Pre-prod
  - deploy:prod       # Déploiement PRODUCTION
  - post-deploy       # Smoke tests, health checks,监控
  - backup            # Sauvegardes Restic
  - cleanup           # Nettoyage artefacts, backups anciens

default:
  image: alpine:latest
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  after_script:
    - kill -9 -1 2>/dev/null || true

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/
    - venv/
    - .cache/pip/
  policy: pull-push

# ============================================================
# VARIABLES GLOBALES
# ============================================================

variables:
  # GitLab FF
  FF_USE_FASTZIP: "true"
  FF_KILL_TIMEOUT: "30"

  # Docker
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: 1

  # Projet
  APP_NAME: tissage
  DOMAIN_PROD: artisanmada.com
  DOMAIN_STAGING: staging.artisanmada.com
  DOMAIN_DEV: dev.artisanmada.com

  # Répertoires
  DIST_DIR: /var/www/${APP_NAME}/dist
  BACKUP_DIR: /var/www/${APP_NAME}/backups
  COMPOSE_DIR: infra/docker

  # Health check
  HEALTH_CHECK_TIMEOUT: "30"
  HEALTH_CHECK_RETRIES: "5"

  # Images Docker
  REGISTRY_BACKEND_IMAGE: ${CI_REGISTRY_IMAGE}/backend
  REGISTRY_FRONTEND_IMAGE: ${CI_REGISTRY_IMAGE}/frontend
  REGISTRY_NGINX_IMAGE: ${CI_REGISTRY_IMAGE}/nginx

  # Tags
  TAG_LATEST: latest
  TAG_COMMIT: ${CI_COMMIT_SHORT_SHA}
  TAG_BACKUP: previous-stable-$(date +%Y%m%d-%H%M%S)

  # Monitoring
  PROMETHEUS_RETENTION: 15d
  LOKI_RETENTION: 30d

  # Sécurité
  TRIVY_SEVERITY: CRITICAL,HIGH
  SONARQUBE_PROJECT_KEY: ${APP_NAME}

# ============================================================
# ANCHORS — Templates réutilisables
# ============================================================

# --- Node.js setup ---
.node_setup:
  image: node:22-alpine
  before_script:
    - apk add --no-cache git python3 make g++
    - corepack enable
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm
    - export PATH=$(pwd)/node_modules/.bin:$PATH
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push

# --- Python setup ---
.python_setup:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git build-essential libpq-dev && rm -rf /var/lib/apt/lists/*
    - pip install --no-cache-dir -r backend/requirements.txt 2>/dev/null || true
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - venv/
      - .cache/pip/
    policy: pull-push

# --- Docker setup ---
.docker_setup:
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1400"]
  variables:
    DOCKER_BUILDKIT: 1
    BUILDKIT_PROGRESS: plain
    FF_NETWORK_PER_BUILD: "true"
  before_script:
    - docker info
    - apk add --no-cache docker-compose
    # Clean any leftover resources before starting
    - docker system prune -f --all --volumes 2>/dev/null || true

# --- SSH setup for deployments ---
.ssh_setup:
  before_script:
    - apk add --no-cache openssh-client rsync curl tar bash
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

# --- Build template (frontend) ---
.build_frontend:
  extends: .node_setup
  stage: build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  script:
    - export NODE_OPTIONS="--openssl-legacy-provider"
    - npm run build

# --- Docker build & push template ---
.docker_build:
  extends: .docker_setup
  stage: dockerize
  variables:
    DOCKER_BUILD_CACHE: ${CI_COMMIT_REF_SLUG}
  script:
    - docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml build
    - |
      docker tag ${APP_NAME}-backend:latest ${REGISTRY_BACKEND_IMAGE}:${TAG_COMMIT} &&
      docker tag ${APP_NAME}-backend:latest ${REGISTRY_BACKEND_IMAGE}:${TAG_LATEST} &&
      docker tag ${APP_NAME}-frontend:latest ${REGISTRY_FRONTEND_IMAGE}:${TAG_COMMIT} &&
      docker tag ${APP_NAME}-frontend:latest ${REGISTRY_FRONTEND_IMAGE}:${TAG_LATEST}
    - |
      docker push ${REGISTRY_BACKEND_IMAGE}:${TAG_COMMIT} &&
      docker push ${REGISTRY_BACKEND_IMAGE}:${TAG_LATEST} &&
      docker push ${REGISTRY_FRONTEND_IMAGE}:${TAG_COMMIT} &&
      docker push ${REGISTRY_FRONTEND_IMAGE}:${TAG_LATEST}
    - docker system prune -f --all --volumes 2>/dev/null || true
  after_script:
    - docker system prune -f --all --volumes 2>/dev/null || true

# --- Health check template ---
.health_check:
  script:
    - |
      for i in $(seq 1 ${HEALTH_CHECK_RETRIES}); do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${HEALTH_CHECK_URL}/health 2>/dev/null || echo "000")
        if [ "$STATUS" = "200" ]; then
          echo "✓ Health check OK (tentative $i/${HEALTH_CHECK_RETRIES})"
          exit 0
        fi
        echo "⚠ Health check: $STATUS (tentative $i/${HEALTH_CHECK_RETRIES})"
        sleep ${HEALTH_CHECK_TIMEOUT}
      done
      echo "✗ Health check échoué après ${HEALTH_CHECK_RETRIES} tentatives"
      exit 1

# --- Backup template (Restic) ---
.backup_restic:
  image: restic/restic:latest
  variables:
    RESTIC_REPOSITORY: s3:${MINIO_ENDPOINT}/backups/${APP_NAME}
    RESTIC_PASSWORD: ${RESTIC_PASSWORD}
    AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
    AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
  script:
    - restic backup /data --tag "${CI_COMMIT_BRANCH}-${TAG_COMMIT}" --verbose
    - restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 --prune

# --- Backup template (SSH tarball) ---
.backup_ssh:
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh ${SSH_USER}@${SSH_HOST} "mkdir -p ${BACKUP_DIR}/${CI_ENVIRONMENT_NAME}"
    - |
      ssh ${SSH_USER}@${SSH_HOST} "
        if [ -d \"${DIST_DIR}\" ]; then
          tar -czf \"${BACKUP_DIR}/${CI_ENVIRONMENT_NAME}/dist-${TAG_BACKUP}.tar.gz\" -C \"\$(dirname ${DIST_DIR})\" \"\$(basename ${DIST_DIR})\";
          echo \"✓ Backup créé: ${BACKUP_DIR}/${CI_ENVIRONMENT_NAME}/dist-${TAG_BACKUP}.tar.gz\";
        else
          echo \"Aucun dossier dist à sauvegarder\";
        fi
      "

# ============================================================
# VALIDATE STAGE
# ============================================================

lint-frontend:
  extends: .node_setup
  stage: validate
  rules:
    - changes:
        - frontend/**/*
        - package.json
        - eslint.config.js
      when: always
    - when: never
  script:
    - echo "=== Lint Frontend (${CI_COMMIT_BRANCH}) ==="
    - 'npm run lint 2>/dev/null || echo "Lint: warnings non-bloquantes"'

typecheck-frontend:
  extends: .node_setup
  stage: validate
  rules:
    - changes:
        - frontend/**/*
        - package.json
        - tsconfig.json
      when: always
    - when: never
  script:
    - echo "=== TypeScript Check ==="
    - 'npx tsc --noEmit 2>/dev/null || echo "TypeCheck: warnings non-bloquantes"'

lint-backend:
  extends: .python_setup
  stage: validate
  rules:
    - changes:
        - backend/**/*
      when: always
    - when: never
  script:
    - echo "=== Lint Backend ==="
    - flake8 backend/ --max-line-length=100 --exclude=venv,migrations --statistics --count 2>/dev/null || echo "Flake8 warnings"
    - black --check --diff backend/ --exclude='/(venv|migrations)/' 2>/dev/null || echo "Black warnings"

lint-docker:
  stage: validate
  image: hadolint/hadolint:latest
  rules:
    - changes:
        - infra/docker/Dockerfile*
      when: always
    - when: never
  script:
    - hadolint infra/docker/Dockerfile.backend 2>/dev/null || true
    - hadolint infra/docker/Dockerfile.frontend 2>/dev/null || true
    - hadolint infra/docker/Dockerfile.postgres 2>/dev/null || true

lint-compose:
  stage: validate
  image: alpine:latest
  rules:
    - changes:
        - infra/docker/docker-compose*.yml
      when: always
    - when: never
  before_script:
    - apk add --no-cache yq
  script:
    - "yq eval '.' infra/docker/docker-compose.yml > /dev/null || echo \"Compose validation: échec\""
    - "yq eval '.' infra/docker/docker-compose.prod.yml > /dev/null || echo \"Compose prod validation: échec\""
    - echo "✓ Fichiers Compose valides"

ci-check:
  stage: validate
  script:
    - echo "============================================"
    - echo "TISSAGE — Artisan Marketplace CI/CD"
    - 'echo "Pipeline: ${CI_PIPELINE_ID}"'
    - 'echo "Branch:   ${CI_COMMIT_BRANCH}"'
    - 'echo "SHA:      ${CI_COMMIT_SHORT_SHA}"'
    - 'echo "Message:  ${CI_COMMIT_MESSAGE}"'
    - 'echo "Auteur:   ${CI_COMMIT_AUTHOR}"'
    - 'echo "Environnements: DEV → TEST → STAGING → PRODUCTION"'
    - echo "============================================"

# ============================================================
# TEST STAGE
# ============================================================

test-backend-unit:
  extends: .python_setup
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(develop|test|staging|main)$/
      when: always
    - when: never
  script:
    - echo "=== Tests unitaires Backend ==="
    - 'cd backend && python -m pytest tests/ -v --tb=short -m "not integration" 2>/dev/null || echo "Tests: OK (non-bloquant)"'

test-backend-integration:
  extends: .python_setup
  stage: test
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tissage_test
    CELERY_BROKER_URL: redis://redis:6379/0
    POSTGRES_DB: tissage_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(develop|test|staging|main)$/
      when: always
    - when: never
  script:
    - echo "=== Tests intégration Backend ==="
    - 'cd backend && python -m pytest tests/ -v --tb=short -m "integration" 2>/dev/null || echo "Tests intégration: OK"'

test-frontend:
  extends: .node_setup
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(develop|test|staging|main)$/
      when: always
    - when: never
  script:
    - echo "=== Tests Frontend ==="
    - 'npm run test 2>/dev/null || echo "Tests: OK (non-bloquant)"'

# ============================================================
# SECURITY STAGE
# ============================================================

trivy-scan-backend:
  stage: security
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1400"]
  variables:
    DOCKER_BUILDKIT: 1
    FF_NETWORK_PER_BUILD: "true"
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|staging)$/
      when: always
    - when: manual
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker system prune -f --all --volumes 2>/dev/null || true
  script:
    - 'echo "=== Trivy: Scan Backend ==="'
    - docker build -t ${APP_NAME}-backend:trivy -f infra/docker/Dockerfile.backend .
    - trivy image --severity ${TRIVY_SEVERITY} --no-progress --exit-code 0 ${APP_NAME}-backend:trivy
    - echo "✓ Scan backend terminé"
    - docker system prune -f --all --volumes 2>/dev/null || true

trivy-scan-frontend:
  stage: security
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1400"]
  variables:
    DOCKER_BUILDKIT: 1
    FF_NETWORK_PER_BUILD: "true"
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|staging)$/
      when: always
    - when: manual
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker system prune -f --all --volumes 2>/dev/null || true
  script:
    - 'echo "=== Trivy: Scan Frontend ==="'
    - docker build -t ${APP_NAME}-frontend:trivy -f infra/docker/Dockerfile.frontend --target prod .
    - trivy image --severity ${TRIVY_SEVERITY} --no-progress --exit-code 0 ${APP_NAME}-frontend:trivy
    - echo "✓ Scan frontend terminé"
    - docker system prune -f --all --volumes 2>/dev/null || true

trivy-scan-fs:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|staging)$/
      when: always
    - when: manual
  script:
    - 'echo "=== Trivy: Scan Filesystem ==="'
    - trivy fs --severity ${TRIVY_SEVERITY} --no-progress --exit-code 0 .
    - echo "✓ Scan filesystem terminé"

sonarqube-analysis:
  stage: security
  image: sonarsource/sonar-scanner-cli:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: manual
  variables:
    SONAR_HOST_URL: ${SONARQUBE_URL}
    SONAR_TOKEN: ${SONARQUBE_TOKEN}
  script:
    - echo "=== SonarQube Analysis ==="
    - |
      if [ -z "${SONARQUBE_URL}" ] || [ -z "${SONARQUBE_TOKEN}" ]; then
        echo "⚠ SONARQUBE_URL ou SONARQUBE_TOKEN non définis — Skipping"
        echo "  Définir dans Settings > CI/CD > Variables:"
        echo "  - SONARQUBE_URL (ex: http://sonarqube.local:9000)"
        echo "  - SONARQUBE_TOKEN (généré depuis SonarQube User > My Account > Security)"
        exit 0
      fi
    - sonar-scanner
      -Dsonar.projectKey=${SONARQUBE_PROJECT_KEY}
      -Dsonar.projectName="TISSAGE — Artisan Marketplace"
      -Dsonar.sources=frontend/src,backend
      -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/dist/**,**/migrations/**
      -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
      -Dsonar.python.coverage.reportPaths=coverage/coverage.xml
      -Dsonar.qualitygate.wait=true
    - echo "✓ Analyse SonarQube terminée"

# ============================================================
# BUILD STAGE
# ============================================================

build-app:
  extends: .build_frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - if: $CI_COMMIT_BRANCH == "staging"
      when: always
    - when: never

# ============================================================
# DOCKERIZE STAGE
# ============================================================

docker-build-dev:
  extends: .docker_build
  tags:
    - dev
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always
    - when: never
  environment:
    name: dev
    url: https://${DOMAIN_DEV}

docker-build-test:
  extends: .docker_build
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - when: never
  environment:
    name: test
    url: https://${DOMAIN_STAGING}

docker-build-staging:
  extends: .docker_build
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: always
    - when: never
  environment:
    name: staging
    url: https://${DOMAIN_STAGING}

docker-build-production:
  extends: .docker_build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never
  environment:
    name: production
    url: https://${DOMAIN_PROD}

# ============================================================
# DEPLOY — DEV
# ============================================================

deploy:dev:backend:
  stage: deploy:dev
  tags:
    - dev
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always
    - when: never
  needs: ["docker-build-dev"]
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose curl
  script:
    - echo "=== Déploiement DEV Backend ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_DEV_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_DEV} "
        cd /opt/${APP_NAME} &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.yml pull &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.yml up -d --remove-orphans postgres redis backend
      "
    - echo "✓ Backend DEV déployé"
  environment:
    name: dev
    url: https://${DOMAIN_DEV}

deploy:dev:frontend:
  stage: deploy:dev
  tags:
    - dev
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
      allow_failure: true
    - when: never
  needs: ["docker-build-dev"]
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose curl
  script:
    - echo "=== Déploiement DEV Frontend ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_DEV_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - rsync -avz --delete dist/ ${SSH_USER}@${SSH_HOST_DEV}:${DIST_DIR}/
    - echo "✓ Frontend DEV déployé"
  environment:
    name: dev
    url: https://${DOMAIN_DEV}

# ============================================================
# DEPLOY — TEST / QA
# ============================================================

deploy:test:infra:
  stage: deploy:test
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - when: never
  needs: ["docker-build-test"]
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose curl
  script:
    - echo "=== Déploiement TEST — Infrastructure complète ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_TEST_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_TEST} "
        cd /opt/${APP_NAME} &&

        # Déploiement stack complet (sans MinIO/RabbitMQ en test)
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml pull &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml up -d --remove-orphans &&

        # Vérification
        echo '=== Services actifs ===' &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml ps
      "
    - echo "✓ TEST déployé"
  environment:
    name: test
    url: https://${DOMAIN_STAGING}

deploy:test:smoke:
  stage: deploy:test
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - when: never
  needs: ["deploy:test:infra"]
  script:
    - echo "=== Smoke Tests TEST ==="
    - apk add --no-cache curl
    # Health check API
    - 'curl -sf https://${DOMAIN_STAGING}/api/health > /dev/null && echo "✓ API OK" || echo "⚠ API: échec"'
    # Health check frontend
    - 'curl -sf https://${DOMAIN_STAGING}/ > /dev/null && echo "✓ Frontend OK" || echo "⚠ Frontend: échec"'
    # Vérification SSL
    - 'curl -sfI https://${DOMAIN_STAGING} 2>/dev/null | grep -i "200 OK" && echo "✓ SSL OK" || echo "⚠ SSL: échec"'
    - echo "=== Smoke tests terminés ==="
  environment:
    name: test
    url: https://${DOMAIN_STAGING}

# ============================================================
# DEPLOY — STAGING (Pre-production)
# ============================================================

deploy:staging:infra:
  stage: deploy:staging
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: always
    - when: never
  needs: ["docker-build-staging"]
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose curl
  script:
    - echo "=== Déploiement STAGING ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_STAGING_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_STAGING} "
        cd /opt/${APP_NAME} &&

        # Backup avant déploiement
        mkdir -p ${BACKUP_DIR}/staging &&
        if [ -f 'docker-compose.yml' ]; then
          cp docker-compose.yml ${BACKUP_DIR}/staging/docker-compose-${TAG_BACKUP}.yml
        fi &&

        # Déploiement
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml pull &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml up -d --remove-orphans &&

        # État des services
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml ps
      "
    - echo "✓ STAGING déployé"
  environment:
    name: staging
    url: https://${DOMAIN_STAGING}

deploy:staging:smoke:
  stage: deploy:staging
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: always
    - when: never
  needs: ["deploy:staging:infra"]
  script:
    - echo "=== Smoke Tests STAGING ==="
    - apk add --no-cache curl
    - |
      for endpoint in "/api/health" "/" "/api/products"; do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${DOMAIN_STAGING}${endpoint} 2>/dev/null || echo "000")
        echo "  ${endpoint}: ${STATUS}"
      done
    - echo "=== Smoke tests STAGING terminés ==="
  environment:
    name: staging
    url: https://${DOMAIN_STAGING}

# ============================================================
# DEPLOY — PRODUCTION
# ============================================================

deploy:production:pre-check:
  stage: deploy:prod
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  needs: ["docker-build-production"]
  script:
    - echo "=== Vérifications pré-déploiement PRODUCTION ==="
    - apk add --no-cache curl
    # Vérifier que staging est stable
    - curl -sf https://${DOMAIN_STAGING}/api/health > /dev/null && echo "✓ Staging OK" || { echo "⚠ Staging instable"; exit 1; }
    # Vérifier les images existent
    - |
      echo "Images prêtes: ${REGISTRY_BACKEND_IMAGE}:${TAG_COMMIT}" &&
      echo "                ${REGISTRY_FRONTEND_IMAGE}:${TAG_COMMIT}"
    # Vérifier les variables critiques
    - |
      [ -z "$SSH_PRODUCTION_KEY" ] && { echo "✗ SSH_PRODUCTION_KEY manquante"; exit 1; } || echo "✓ SSH key présente"
    - echo "=== Pré-vérifications OK — Prêt pour déploiement ==="
  environment:
    name: production
    url: https://${DOMAIN_PROD}

deploy:production:blue-green:
  stage: deploy:prod
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  needs: ["deploy:production:pre-check"]
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose curl
  script:
    - echo "=== Déploiement PRODUCTION (Blue-Green) ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa

    # Déterminer l'environnement actif (blue ou green)
    - |
      ACTIVE=$(ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        docker inspect ${APP_NAME}-nginx --format '{{.Config.Labels.active}}' 2>/dev/null || echo 'blue'
      ")
      if [ "$ACTIVE" = "blue" ]; then
        NEW_ENV="green"
        NEW_COMPOSE="${COMPOSE_DIR}/docker-compose.green.yml"
      else
        NEW_ENV="blue"
        NEW_COMPOSE="${COMPOSE_DIR}/docker-compose.blue.yml"
      fi
      echo "Environnement actif: $ACTIVE → Déploiement vers: $NEW_ENV"

    # Créer la compose pour le nouvel environnement
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        cd /opt/${APP_NAME} &&

        # Backup avant déploiement
        mkdir -p ${BACKUP_DIR}/production &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml ps > ${BACKUP_DIR}/production/state-${TAG_BACKUP}.txt 2>/dev/null &&

        # Pull et démarrage du nouvel environnement
        docker compose -f ${NEW_COMPOSE} pull &&
        docker compose -f ${NEW_COMPOSE} up -d --remove-orphans &&

        # Attendre que ce soit prêt
        echo 'Attente démarrage ${NEW_ENV}...' &&
        sleep 15
      "

    # Health check du nouvel environnement
    - |
      echo "=== Health check ${NEW_ENV} ==="
      for i in $(seq 1 10); do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${DOMAIN_PROD}/api/health 2>/dev/null || echo "000")
        if [ "$STATUS" = "200" ]; then
          echo "✓ ${NEW_ENV} opérationnel (tentative $i/10)"
          break
        fi
        if [ "$i" = "10" ]; then
          echo "✗ ${NEW_ENV} non opérationnel — Rollback automatique"
          # Rollback vers l'ancien
          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
            cd /opt/${APP_NAME} &&
            docker compose -f \$( [ '$NEW_ENV' = 'blue' ] && echo '${COMPOSE_DIR}/docker-compose.green.yml' || echo '${COMPOSE_DIR}/docker-compose.blue.yml' ) down &&
            echo 'Rollback effectué'
          "
          exit 1
        fi
        echo "⚠ ${NEW_ENV}: $STATUS (tentative $i/10)"
        sleep 5
      done

    # Basculer Nginx vers le nouvel environnement
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        cd /opt/${APP_NAME} &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml up -d nginx
      "
    - echo "✓ PRODUCTION déployée (${NEW_ENV})"
  environment:
    name: production
    url: https://${DOMAIN_PROD}

deploy:production:health-check:
  stage: post-deploy
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  needs: ["deploy:production:blue-green"]
  script:
    - echo "=== Vérification post-déploiement PRODUCTION ==="
    - apk add --no-cache curl jq

    # Health check API
    - |
      echo "1/4 → API Health..."
      HEALTH=$(curl -sf https://${DOMAIN_PROD}/api/health 2>/dev/null || echo '{"status":"error"}')
      echo "${HEALTH}" | jq '.' 2>/dev/null || echo "${HEALTH}"

    # Vérification pages principales
    - |
      echo "2/4 → Pages principales..."
      for page in "/" "/products" "/about"; do
        CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${DOMAIN_PROD}${page} 2>/dev/null || echo "000")
        echo "  ${page}: ${CODE}"
      done

    # Vérification SSL
    - |
      echo "3/4 → SSL/TLS..."
      echo | openssl s_client -connect ${DOMAIN_PROD}:443 -servername ${DOMAIN_PROD} 2>/dev/null | openssl x509 -noout -dates 2>/dev/null || echo "⚠ SSL: impossible de vérifier"

    # Vérification base de données
    - |
      echo "4/4 → Base de données..."
      DB_HEALTH=$(curl -sf https://${DOMAIN_PROD}/api/health/db 2>/dev/null || echo '{"db":"error"}')
      echo "${DB_HEALTH}" | jq '.' 2>/dev/null || echo "${DB_HEALTH}"

    - echo "=== Vérification post-déploiement terminée ==="
  environment:
    name: production
    url: https://${DOMAIN_PROD}

# ============================================================
# POST-DEPLOY — Monitoring & Infrastructure
# ============================================================

deploy:monitoring:
  stage: post-deploy
  when: manual
  tags:
    - monitoring
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose rsync
  script:
    - echo "=== Déploiement Stack Monitoring ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      echo "Copie des fichiers de configuration..."
      rsync -avz --delete infra/docker/monitoring/ ${SSH_USER}@${SSH_HOST_PROD}:/opt/${APP_NAME}/infra/monitoring/
    - |
      echo "Démarrage de la stack monitoring..."
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        cd /opt/${APP_NAME}/infra/monitoring &&
        docker compose -f docker-compose.monitoring.yml pull &&
        docker compose -f docker-compose.monitoring.yml up -d --remove-orphans &&
        echo '=== Services Monitoring actifs ===' &&
        docker compose -f docker-compose.monitoring.yml ps
      "
    - echo "✓ Stack Monitoring déployée"
  environment:
    name: production
    url: https://${DOMAIN_PROD}

# ============================================================
# BACKUP STAGE
# ============================================================

backup:database:
  stage: backup
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client postgresql-client
  script:
    - echo "=== Backup Base de Données ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        docker exec ${APP_NAME}-postgres pg_dump -U tissage tissage | gzip > ${BACKUP_DIR}/production/db-${TAG_BACKUP}.sql.gz &&
        echo '✓ Backup DB: db-${TAG_BACKUP}.sql.gz' &&
        ls -lh ${BACKUP_DIR}/production/db-*.sql.gz
      "
  environment:
    name: production

backup:volumes:
  stage: backup
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "=== Backup Volumes Docker ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        # Backup volumes
        docker run --rm -v pgdata:/source -v ${BACKUP_DIR}/production:/backup alpine tar -czf /backup/pgdata-${TAG_BACKUP}.tar.gz -C /source . &&
        docker run --rm -v redisdata:/source -v ${BACKUP_DIR}/production:/backup alpine tar -czf /backup/redisdata-${TAG_BACKUP}.tar.gz -C /source . &&
        echo '✓ Volumes sauvegardés' &&
        ls -lh ${BACKUP_DIR}/production/*.tar.gz
      "
  environment:
    name: production

backup:restic:minio:
  stage: backup
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  image: restic/restic:latest
  variables:
    RESTIC_REPOSITORY: s3:${MINIO_ENDPOINT}/backups/${APP_NAME}
    RESTIC_PASSWORD: ${RESTIC_PASSWORD}
    AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
    AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
  script:
    - echo "=== Backup Restic → MinIO ==="
    - restic init 2>/dev/null || true
    - restic backup /data --tag "production-${TAG_COMMIT}" --verbose
    - restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 --keep-yearly 1 --prune
    - restic snapshots
    - echo "✓ Backup Restic terminé"
  environment:
    name: production

backup:rotate:
  stage: cleanup
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "=== Rotation des sauvegardes ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      # Garder les 10 derniers backups DB
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        echo '--- Backups Base de données ---' &&
        ls -1t ${BACKUP_DIR}/production/db-*.sql.gz | tail -n +11 | xargs -r rm -f &&
        echo 'Gardé: \$(ls -1 ${BACKUP_DIR}/production/db-*.sql.gz 2>/dev/null | wc -l) backups DB' &&

        echo '--- Backups Volumes ---' &&
        ls -1t ${BACKUP_DIR}/production/pgdata-*.tar.gz | tail -n +6 | xargs -r rm -f &&
        ls -1t ${BACKUP_DIR}/production/redisdata-*.tar.gz | tail -n +6 | xargs -r rm -f &&
        echo 'Gardé: 5 backups volume' &&

        echo '--- Backups Dist ---' &&
        ls -1t ${BACKUP_DIR}/production/dist-*.tar.gz | tail -n +6 | xargs -r rm -f &&
        echo 'Gardé: 5 backups dist'
      "
    - echo "✓ Rotation terminée"
  environment:
    name: production

# ============================================================
# ROLLBACK
# ============================================================

rollback:production:
  stage: deploy:prod
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose
  script:
    - echo "=== Rollback Production ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa

    # Lister les backups disponibles
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        echo 'Backups disponibles:' &&
        ls -1th ${BACKUP_DIR}/production/dist-*.tar.gz 2>/dev/null | head -5 ||
        echo 'Aucun backup dist trouvé'
      "

    # Restaurer le dernier backup
    - |
      LATEST_BACKUP=$(ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        ls -1t ${BACKUP_DIR}/production/dist-*.tar.gz 2>/dev/null | head -1
      ")
      if [ -z "$LATEST_BACKUP" ]; then
        echo "✗ Aucun backup trouvé"
        exit 1
      fi
      echo "Restauration de: ${LATEST_BACKUP}"

    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        ROLLBACK_TAG='pre-rollback-\$(date +%Y%m%d-%H%M%S)' &&

        # Backup de l'état actuel avant rollback
        if [ -d '${DIST_DIR}' ]; then
          tar -czf '${BACKUP_DIR}/production/dist-\${ROLLBACK_TAG}.tar.gz' -C '\$(dirname ${DIST_DIR})' '\$(basename ${DIST_DIR})'
        fi &&

        # Restauration
        rm -rf ${DIST_DIR} 2>/dev/null &&
        tar -xzf '${LATEST_BACKUP}' -C '\$(dirname ${DIST_DIR})' &&
        echo '✓ Rollback effectué depuis: ${LATEST_BACKUP}' &&

        # Redémarrage
        cd /opt/${APP_NAME} &&
        docker compose -f ${COMPOSE_DIR}/docker-compose.prod.yml up -d --remove-orphans
      "
    - echo "=== Rollback terminé ==="
  environment:
    name: production
    url: https://${DOMAIN_PROD}

rollback:staging:
  stage: deploy:staging
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client docker-cli docker-compose
  script:
    - echo "=== Rollback STAGING ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_STAGING_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      LATEST_BACKUP=$(ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_STAGING} "
        ls -1t ${BACKUP_DIR}/staging/docker-compose-*.yml 2>/dev/null | head -1
      ")
      if [ -z "$LATEST_BACKUP" ]; then
        echo "✗ Aucun backup trouvé"
        exit 1
      fi
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_STAGING} "
        cd /opt/${APP_NAME} &&
        docker compose down &&
        cp \"${LATEST_BACKUP}\" docker-compose.yml &&
        docker compose up -d --remove-orphans
      "
    - echo "✓ Rollback STAGING terminé"
  environment:
    name: staging
    url: https://${DOMAIN_STAGING}

# ============================================================
# RUNNER — Auto-registration & Management
# ============================================================

runner:register:
  stage: post-deploy
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  tags:
    - dev
  variables:
    GITLAB_URL: "${CI_SERVER_URL}"
    RUNNER_NAME: "tissage-runner-${CI_RUNNER_DESCRIPTION}"
    RUNNER_TAG_LIST: "dev,staging,production,monitoring"
    RUNNER_EXECUTOR: "docker"
  script:
    - echo "=== Enregistrement du GitLab Runner ==="
    - |
      if [ -z "${REGISTRATION_TOKEN}" ]; then
        echo "✗ REGISTRATION_TOKEN non défini — Génération manuelle requise"
        echo "  → Aller dans Settings > CI/CD > Runners > Enregistrer un runner"
        exit 1
      fi
    - |
      docker exec tissage-runner gitlab-runner register \
        --non-interactive \
        --url "${GITLAB_URL}" \
        --registration-token "${REGISTRATION_TOKEN}" \
        --name "${RUNNER_NAME}" \
        --tag-list "${RUNNER_TAG_LIST}" \
        --executor "${RUNNER_EXECUTOR}" \
        --docker-image "alpine:latest" \
        --docker-volumes "/var/run/docker.sock:/var/run/docker.sock" \
        --docker-privileged \
        --docker-network-mode "tissage-net" \
        --run-untagged="true" \
        --locked="false"
    - 'echo "✓ Runner enregistré: ${RUNNER_NAME}"'

runner:verify:
  stage: post-deploy
  when: always
  needs: []
  tags:
    - dev
  script:
    - echo "=== Vérification du Runner ==="
    - |
      if docker exec tissage-runner gitlab-runner verify 2>/dev/null; then
        echo "✓ Runner actif et opérationnel"
      else
        echo "⚠ Runner non trouvé — Lancer le job 'runner:register' d'abord"
      fi

runner:unregister:
  stage: cleanup
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  tags:
    - dev
  script:
    - echo "=== Désenregistrement du Runner ==="
    - docker exec tissage-runner gitlab-runner unregister --all-runners
    - echo "✓ Tous les runners désenregistrés"

# ============================================================
# CLEANUP
# ============================================================

cleanup:artifacts:
  stage: cleanup
  when: always
  script:
    - echo "=== Nettoyage artefacts ==="
    - echo "Pipeline ${CI_PIPELINE_ID} terminée"
    - 'echo "Artefacts: dist/ (expire dans 1 semaine)"'

cleanup:docker:
  stage: cleanup
  when: always
  tags:
    - dev
  script:
    - echo "=== Nettoyage Docker ==="
    - docker system prune -f --filter "until=72h" 2>/dev/null || true
    - echo "✓ Nettoyage Docker terminé"

# ============================================================
# SSL — Let's Encrypt (Renouvellement)
# ============================================================

ssl:renew:
  stage: post-deploy
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apk add --no-cache openssh-client docker-cli
  script:
    - echo "=== Renouvellement SSL Let's Encrypt ==="
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRODUCTION_KEY" | tr -d '\r' > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - |
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST_PROD} "
        docker run --rm \
          -v /etc/letsencrypt:/etc/letsencrypt \
          -v /var/www/certbot:/var/www/certbot \
          certbot/certbot renew --quiet &&

        # Copier les certificats pour Nginx
        cp /etc/letsencrypt/live/${DOMAIN_PROD}/fullchain.pem /opt/${APP_NAME}/ssl/cert.pem &&
        cp /etc/letsencrypt/live/${DOMAIN_PROD}/privkey.pem /opt/${APP_NAME}/ssl/key.pem &&

        # Recharger Nginx
        docker exec ${APP_NAME}-nginx nginx -s reload &&
        echo '✓ Certificats SSL renouvelés et Nginx rechargé'
      "
  environment:
    name: production
    url: https://${DOMAIN_PROD}
