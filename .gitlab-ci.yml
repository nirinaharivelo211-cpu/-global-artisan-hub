image: node:22-alpine

stages:
  - lint
  - typecheck
  - test
  - build
  - dockerize
  - deploy

variables:
  NODE_ENV: development
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - backend/venv/

# ──────────────────────────────────────────────
# FRONTEND (TanStack / React)
# ──────────────────────────────────────────────

lint-frontend:
  stage: lint
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error
  script:
    - npm run lint
  artifacts:
    reports:
      eslint: eslint-report.json
    when: always
  only:
    changes:
      - frontend/**/*
      - package.json
      - eslint.config.js

typecheck:
  stage: typecheck
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error
  script:
    - npx tsc --noEmit
  only:
    changes:
      - frontend/**/*
      - package.json
      - tsconfig.json

build-frontend:
  stage: build
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main
    - develop

# ──────────────────────────────────────────────
# BACKEND (Flask / Python)
# ──────────────────────────────────────────────

lint-backend:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir -r backend/requirements.txt flake8 black
  script:
    - flake8 backend/ --max-line-length=100 --exclude=venv,migrations
    - black --check --diff backend/ --exclude='/(venv|migrations)/'
  only:
    changes:
      - backend/**/*

test-backend:
  stage: test
  image: python:3.11-slim
  services:
    - postgres:16-alpine
  variables:
    DATABASE_URL: postgresql://tissage:tissage@postgres:5432/tissage_test
    FLASK_ENV: testing
  before_script:
    - apt-get update && apt-get install -y libpq-dev gcc && rm -rf /var/lib/apt/lists/*
    - pip install --no-cache-dir -r backend/requirements.txt pytest
  script:
    - cd backend && pytest --junitxml=report.xml
  artifacts:
    reports:
      junit: backend/report.xml
  only:
    - main
    - develop

# ──────────────────────────────────────────────
# DOCKER BUILD
# ──────────────────────────────────────────────

dockerize:
  stage: dockerize
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest -f infra/docker/Dockerfile.backend .
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest -f infra/docker/Dockerfile.frontend --target prod .
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main

# ──────────────────────────────────────────────
# DEPLOY
# ──────────────────────────────────────────────

deploy-staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-compose
  script:
    - chmod 400 $SSH_PRIVATE_KEY
    - scp -o StrictHostKeyChecking=no infra/docker/docker-compose.prod.yml deploy@$STAGING_HOST:/app/docker-compose.yml
    - ssh -o StrictHostKeyChecking=no deploy@$STAGING_HOST "
        docker compose -f /app/docker-compose.yml pull &&
        docker compose -f /app/docker-compose.yml up -d --remove-orphans
      "
  environment:
    name: staging
    url: https://staging.artisanmada.com
  only:
    - main
  when: manual

deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-compose
  script:
    - chmod 400 $SSH_PRIVATE_KEY_PROD
    - scp -o StrictHostKeyChecking=no infra/docker/docker-compose.prod.yml deploy@$PROD_HOST:/app/docker-compose.yml
    - ssh -o StrictHostKeyChecking=no deploy@$PROD_HOST "
        docker compose -f /app/docker-compose.yml pull &&
        docker compose -f /app/docker-compose.yml up -d --remove-orphans
      "
  environment:
    name: production
    url: https://artisanmada.com
  only:
    - main
  when: manual
