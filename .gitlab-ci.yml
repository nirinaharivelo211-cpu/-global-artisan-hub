image: node:22-alpine

stages:
  - validate
  - build
  - dockerize
  - deploy

variables:
  NODE_ENV: development

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - backend/venv/
    - .npm/

# ──────────────────────────────────────────────
# VALIDATION
# ──────────────────────────────────────────────

lint-frontend:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm
  script:
    - npm run lint
  artifacts:
    when: always
  only:
    changes:
      - frontend/**/*
      - package.json
      - eslint.config.js

typecheck:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm
  script:
    - npx tsc --noEmit
  only:
    changes:
      - frontend/**/*
      - package.json
      - tsconfig.json

lint-backend:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir --only-binary=:all: flake8 black 2>/dev/null || pip install flake8 black
  script:
    - flake8 backend/ --max-line-length=100 --exclude=venv,migrations || true
    - black --check --diff backend/ --exclude='/(venv|migrations)/' || true
  only:
    changes:
      - backend/**/*

# ──────────────────────────────────────────────
# BUILD
# ──────────────────────────────────────────────

build-frontend:
  stage: build
  image: node:22-alpine
  before_script:
    - npm ci --no-audit --no-fund --loglevel=error --cache .npm
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main

# ──────────────────────────────────────────────
# DOCKERIZE
# ──────────────────────────────────────────────

dockerize:
  stage: dockerize
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
  script:
    - docker build -t tissage-backend:latest -f infra/docker/Dockerfile.backend .
    - docker build -t tissage-frontend:latest -f infra/docker/Dockerfile.frontend --target prod .
    - docker tag tissage-backend:latest $CI_REGISTRY_IMAGE/backend:latest 2>/dev/null || true
    - docker tag tissage-frontend:latest $CI_REGISTRY_IMAGE/frontend:latest 2>/dev/null || true
  only:
    - main

# ──────────────────────────────────────────────
# DEPLOY (manual)
# ──────────────────────────────────────────────

deploy-staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-cli
  script:
    - echo "Deploiement staging - preparation"
    - echo "SSH_KEY=$SSH_PRIVATE_KEY" | wc -c
  environment:
    name: staging
  only:
    - main
  when: manual

deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-cli
  script:
    - echo "Deploiement production - preparation"
    - echo "SSH_KEY_PROD=$SSH_PRIVATE_KEY_PROD" | wc -c
  environment:
    name: production
  only:
    - main
  when: manual
