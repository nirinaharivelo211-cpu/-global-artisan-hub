services:
  postgres:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.postgres
    container_name: tissage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tissage
      POSTGRES_PASSWORD: tissage_dev_2026
      POSTGRES_DB: tissage
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tissage -d tissage"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tissage-net

  redis:
    image: redis:7-alpine
    container_name: tissage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - tissage-net

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: tissage-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      SECRET_KEY: dev-secret-key-tissage-2026
      JWT_SECRET_KEY: dev-jwt-secret-tissage-2026
      DATABASE_URL: postgresql://tissage:tissage_dev_2026@postgres:5432/tissage
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    networks:
      - tissage-net

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: dev
    container_name: tissage-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:8000/api
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      - backend
    volumes:
      - ../../:/app
      - /app/node_modules
    networks:
      - tissage-net

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    container_name: tissage-runner
    restart: unless-stopped
    environment:
      - TZ=Indian/Antananarivo
    volumes:
      - runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - tissage-net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  postgres_data:
  redis_data:
  runner_config:

networks:
  tissage-net:
    driver: bridge
