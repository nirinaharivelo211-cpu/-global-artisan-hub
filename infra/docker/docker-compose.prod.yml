version: "3.9"

services:
  postgres:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.postgres
    container_name: tissage-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tissage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tissage
    networks:
      - tissage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tissage -d tissage"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: tissage-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://tissage:${POSTGRES_PASSWORD}@postgres:5432/tissage
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY: eur
      FLW_SECRET_KEY: ${FLW_SECRET_KEY}
      FLW_PUBLIC_KEY: ${FLW_PUBLIC_KEY}
      FLW_ENCRYPTION_KEY: ${FLW_ENCRYPTION_KEY}
      FLW_WEBHOOK_SECRET: ${FLW_WEBHOOK_SECRET}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: "true"
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    expose:
      - "8000"
    networks:
      - tissage-net

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: prod
    container_name: tissage-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "80:3000"
      - "443:3000"
    networks:
      - tissage-net

  redis:
    image: redis:7-alpine
    container_name: tissage-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - tissage-net

  nginx:
    image: nginx:1.27-alpine
    container_name: tissage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tissage-net

volumes:
  pgdata:
  redisdata:

networks:
  tissage-net:
    driver: bridge
