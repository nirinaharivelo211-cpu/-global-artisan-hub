services:
  postgres:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.postgres
    container_name: tissage-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tissage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tissage
    networks:
      - tissage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tissage -d tissage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tissage-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - tissage-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: tissage-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    expose:
      - "8000"
    networks:
      - tissage-net

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: prod
    container_name: tissage-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - tissage-net

  nginx:
    image: nginx:1.27-alpine
    container_name: tissage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tissage-net

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    container_name: tissage-runner
    restart: unless-stopped
    environment:
      - TZ=Indian/Antananarivo
    volumes:
      - runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - tissage-net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  pgdata:
  redisdata:
  runner_config:

networks:
  tissage-net:
    driver: bridge
