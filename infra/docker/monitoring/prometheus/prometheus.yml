global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
